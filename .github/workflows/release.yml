name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.1) — must already exist in the repo"
        required: true
        type: string

permissions: {}

jobs:
  publish-npm:
    name: npm publish (OIDC + provenance)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package.json version
        env:
          EFFECTIVE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${EFFECTIVE_TAG#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Install npm dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Publish to npm with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Verify the published package installs and runs
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "Waiting for @stelnyx/apigate@${PKG_VERSION} to surface on the registry…"
          for i in 1 2 3 4 5 6; do
            if npm view "@stelnyx/apigate@${PKG_VERSION}" version >/dev/null 2>&1; then break; fi
            sleep 15
          done
          npm install -g "@stelnyx/apigate@${PKG_VERSION}"
          apigate --version
          apigate --help | head -5
